<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Take the Test — Test Your Mind</title>
    <meta name="description"
        content="Answer each question honestly to discover your result. This test is science-backed and takes just a few minutes.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="bg-orbs"></div>

    <header class="header">
        <nav class="nav">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🧠</div>Test Your Mind
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a><a href="tests.html" class="active">Tests</a><a
                    href="articles.html">Articles</a><a href="about.html">About</a>
                <a href="tests.html" class="nav-cta">Take a Test ✨</a>
            </div>
            <button class="nav-hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
        </nav>
    </header>
    <nav class="mobile-nav">
        <a href="index.html">🏠 Home</a><a href="tests.html">🧪 Tests</a><a href="articles.html">📖 Articles</a><a
            href="about.html">💡 About</a><a href="contact.html">✉️ Contact</a>
    </nav>

    <div class="test-play-wrapper">
        <div class="test-play-container">
            <!-- Test header -->
            <div id="testHeader" style="text-align:center;margin-bottom:40px">
                <div id="testEmoji" style="font-size:3rem;margin-bottom:12px"></div>
                <h1 id="testTitle"
                    style="font-family:var(--font-display);font-size:1.4rem;color:var(--color-white);margin-bottom:4px">
                </h1>
                <p style="font-size:0.88rem;color:var(--color-text-muted)">Answer honestly — choose the response that
                    best reflects how you actually feel or behave.</p>
            </div>
            <!-- Test engine renders here -->
        </div>
    </div>

    <script src="js/data/tests.js"></script>
    <script src="js/main.js"></script>
    <script src="js/test-engine.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const test = TESTS_DATA.find(t => t.slug === id) || TESTS_DATA[0];
        document.title = test.title + ' — Test Your Mind';
        document.getElementById('testEmoji').textContent = test.emoji;
        document.getElementById('testTitle').textContent = test.title;
        const engine = new TestEngine(test);
        engine.init();
    </script>
</body>

</html>
